openapi: 3.0.0
info:
  title: Homework Auth API
  version: 1.0.0
  description: ระบบ Authentication ด้วย JWT ตามโจทย์การบ้าน
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /login:
    post:
      summary: ส่ง Username เพื่อรับ Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "admin"
      responses:
        '200':
          description: เข้าสู่ระบบสำเร็จ ได้รับ Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
  /admin-only:
    get:
      summary: เข้าถึงหน้าแดชบอร์ดของ Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ยืนยันตัวตนผ่านและเป็น Admin
        '401':
          description: ไม่ได้ส่ง Token ใน Header
        '403':
          description: ส่ง Token แต่ไม่ใช่ Admin หรือ Token ไม่ถูกต้อง